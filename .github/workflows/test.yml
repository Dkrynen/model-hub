name: tests

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "29 4 * * 2"

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install pinned uv
        run: python -m pip install uv==0.11.28

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system pytest pytest-asyncio apispec pillow "pyinstaller==6.21.0"

      - name: Run non-live tests and boundary guards
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m pytest -m "not live" -p no:cacheprovider -q

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.5
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install exact dependencies
        working-directory: web
        run: npm ci

      - name: Test, typecheck, build, and audit
        working-directory: web
        run: |
          npm test
          npm run typecheck
          npm run build
          npm run check:bundle
          npm audit --audit-level=high

  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install exact dependencies
        working-directory: worker
        run: npm ci

      - name: Test bindings, types, audits, and deploy shape
        working-directory: worker
        run: |
          npm test
          npm run typecheck
          npm run types:check
          npm audit --audit-level=high
          npx wrangler deploy --dry-run --env staging
          npx wrangler deploy --dry-run --env production

  secrets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Verify tracked secret baseline has no new findings
        shell: bash
        run: |
          python -m pip install detect-secrets==1.5.0
          git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20.19.5

      - name: Audit Python requirements and generate SBOMs
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install "pip-audit==2.10.1" "cyclonedx-bom==7.3.0"
          python -m pip_audit -r requirements.txt
          python -m cyclonedx_py requirements requirements.txt --output-file python-sbom.json
          npm ci --ignore-scripts --prefix web
          npm ci --ignore-scripts --prefix worker
          npm sbom --prefix web --sbom-format cyclonedx > web-sbom.json
          npm sbom --prefix worker --sbom-format cyclonedx > worker-sbom.json

      - name: Upload reviewable SBOMs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ github.sha }}
          if-no-files-found: error
          retention-days: 30
          path: |
            python-sbom.json
            web-sbom.json
            worker-sbom.json

  release-lock:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Audit the exact Windows release dependency lock
        shell: pwsh
        run: |
          python -m pip install "pip-audit==2.10.1"
          python -m pip_audit -r requirements-release.lock
