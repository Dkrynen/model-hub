name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web app (bundled into the exe)
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller build.spec

      - name: Build installer with InnoSetup
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          (Get-Content installer.iss) -replace '1\.0\.0', $tag | Set-Content installer.iss
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/APT-Setup-*.exe
            dist/model-hub.exe

  # Linux/macOS legs stay as COMPILE PROOF only — their binaries are NOT
  # attached to releases (v1 launch is Windows-first; macOS/Linux are teased
  # via the waitlist, each shipping as its own launch moment later).
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web app
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller build.spec
      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/model-hub

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web app
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller build.spec
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/model-hub

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4

      - name: Create draft release (Windows installer only — review before publish)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            windows-build/APT-Setup-*.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
