name: Signed Windows Release Candidate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Exact release tag (for example v2.7.0)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    environment: production-release
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Resolve and verify the immutable release version
        id: release_version
        shell: pwsh
        env:
          REQUESTED_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:REQUESTED_RELEASE_TAG
          if ($tag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Version must be an exact vX.Y.Z tag; got '$tag'"
          }
          if ($env:GITHUB_REF -ne "refs/tags/$tag") {
            throw "Release builds must execute from the exact immutable tag ref refs/tags/$tag."
          }
          $tagType = git cat-file -t "refs/tags/$tag" 2>$null
          if ($LASTEXITCODE -ne 0 -or $tagType -ne "tag") {
            throw "The release tag must be an annotated tag object."
          }
          $tagCommit = git rev-parse --verify "refs/tags/$tag^{commit}" 2>$null
          if ($LASTEXITCODE -ne 0 -or $tagCommit -ne $env:GITHUB_SHA) {
            throw "The release tag must already exist and identify the exact workflow commit."
          }
          $tagObject = git rev-parse --verify "refs/tags/$tag" 2>$null
          if ($LASTEXITCODE -ne 0) {
            throw "The release tag object could not be resolved."
          }
          $tagRefJson = gh api `
            -H "Accept: application/vnd.github+json" `
            -H "X-GitHub-Api-Version: 2022-11-28" `
            "/repos/$env:GITHUB_REPOSITORY/git/ref/tags/$tag"
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub could not resolve the current release tag ref."
          }
          $tagRefRecord = $tagRefJson | ConvertFrom-Json
          if ($tagRefRecord.object.type -ne "tag" -or
              $tagRefRecord.object.sha -ne $tagObject) {
            throw "The current remote release tag ref must identify the verified annotated tag object."
          }
          $tagJson = gh api `
            -H "Accept: application/vnd.github+json" `
            -H "X-GitHub-Api-Version: 2022-11-28" `
            "/repos/$env:GITHUB_REPOSITORY/git/tags/$tagObject"
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub could not verify the release tag object."
          }
          $tagRecord = $tagJson | ConvertFrom-Json
          if ($tagRecord.tag -ne $tag -or
              $tagRecord.verification.verified -ne $true -or
              $tagRecord.verification.reason -ne "valid" -or
              $tagRecord.object.sha -ne $env:GITHUB_SHA) {
            throw "The release tag must have the exact requested name and a valid GitHub-verified signature over this commit."
          }
          python scripts/verify_release_version.py --expected $tag
          python scripts/pro_commerce_readiness.py --require-baked-gate --allow-missing-lac-pro --worker-env production --allow-worker-placeholders --require-receipt-signing
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$($tag.Substring(1))" >> $env:GITHUB_OUTPUT

      - name: Require protected release controls
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.SIGNING_CERTIFICATE_PFX_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          SIGNING_TIMESTAMP_URL: ${{ vars.SIGNING_TIMESTAMP_URL }}
          INNO_SETUP_LICENSE_CONFIRMED: ${{ vars.INNO_SETUP_LICENSE_CONFIRMED }}
        run: |
          if ($env:INNO_SETUP_LICENSE_CONFIRMED -ne "true") {
            throw "The protected environment must confirm the commercial Inno Setup license."
          }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_PFX_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_PASSWORD) -or
              [string]::IsNullOrWhiteSpace($env:SIGNING_TIMESTAMP_URL)) {
            throw "Authenticode certificate and timestamp settings are required."
          }

      - name: Smoke the exact protected production delivery gate
        shell: pwsh
        env:
          LAC_PRO_TEST_LOCAL_KEY: ${{ secrets.LAC_PRO_TEST_LOCAL_KEY }}
          LAC_PRO_TEST_CLOUD_KEY: ${{ secrets.LAC_PRO_TEST_CLOUD_KEY }}
          PRO_GATE_TESTED_VERSION: ${{ vars.PRO_GATE_TESTED_VERSION }}
          PRO_GATE_WAF_EVIDENCE: ${{ vars.PRO_GATE_WAF_EVIDENCE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LAC_PRO_TEST_LOCAL_KEY) -or
              [string]::IsNullOrWhiteSpace($env:LAC_PRO_TEST_CLOUD_KEY) -or
              [string]::IsNullOrWhiteSpace($env:PRO_GATE_TESTED_VERSION) -or
              [string]::IsNullOrWhiteSpace($env:PRO_GATE_WAF_EVIDENCE)) {
            throw "Local, Cloud, deployed-version, and WAF production evidence are required."
          }
          if ($env:PRO_GATE_TESTED_VERSION -ne $env:GITHUB_SHA) {
            throw "The protected production gate evidence must identify this exact release commit."
          }
          if ($env:PRO_GATE_WAF_EVIDENCE -notmatch '^sha256:[0-9a-f]{64}$') {
            throw "The protected WAF evidence must be a SHA-256 record digest."
          }
          python scripts/pro_commerce_readiness.py --require-baked-gate --allow-missing-lac-pro --worker-env production --allow-worker-placeholders --require-receipt-signing --live-gate --expected-deployment-commit "${{ github.sha }}" --valid-key-env LAC_PRO_TEST_LOCAL_KEY
          python scripts/pro_commerce_readiness.py --require-baked-gate --allow-missing-lac-pro --worker-env production --allow-worker-placeholders --require-receipt-signing --live-gate --expected-deployment-commit "${{ github.sha }}" --valid-key-env LAC_PRO_TEST_CLOUD_KEY

      - name: Build web app
        working-directory: web
        run: |
          npm ci
          npm test
          npm run typecheck
          npm run build
          npm run check:bundle
          npm audit --audit-level=high
          npm sbom --sbom-format cyclonedx > dist/web-sbom.json

      - name: Audit and install Python dependencies
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          python -m pip install --disable-pip-version-check "uv==0.11.28"
          uv pip install --system --require-hashes -r requirements-release.lock
          python -m pip_audit -r requirements-release.lock
          python -m cyclonedx_py environment --output-file dist/python-sbom.json

      - name: Run the complete source and secret gates
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python -m pytest -m "not live" -p no:cacheprovider -q
          $tracked = @(git ls-files)
          & detect-secrets-hook --baseline .secrets.baseline @tracked
          if ($LASTEXITCODE -ne 0) { throw "Tracked secret scan failed" }

      - name: Run the complete delivery Worker gates
        working-directory: worker
        run: |
          npm ci
          npm test
          npm run typecheck
          npm run types:check
          npm audit --audit-level=high
          npx wrangler deploy --dry-run --env staging
          npx wrangler deploy --dry-run --env production

      - name: Build application
        run: pyinstaller -y build.spec

      - name: Import signing certificate and sign application
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.SIGNING_CERTIFICATE_PFX_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          SIGNING_TIMESTAMP_URL: ${{ vars.SIGNING_TIMESTAMP_URL }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "lac-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_PFX_BASE64))
          try {
            $password = ConvertTo-SecureString $env:SIGNING_CERTIFICATE_PASSWORD -AsPlainText -Force
            $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
              Where-Object FullName -Match '\\x64\\signtool\.exe$' |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
            if (-not $signtool) { throw "signtool.exe was not found" }
            & $signtool sign /sha1 $certificate.Thumbprint /s My /fd SHA256 /tr $env:SIGNING_TIMESTAMP_URL /td SHA256 dist\lac\lac.exe
            if ($LASTEXITCODE -ne 0) { throw "Application signing failed" }
            if ((Get-AuthenticodeSignature -FilePath dist\lac\lac.exe).Status -ne "Valid") {
              throw "Application Authenticode verification failed"
            }
          } finally {
            Remove-Item -LiteralPath $pfxPath -Force -ErrorAction SilentlyContinue
            if ($null -ne $certificate) {
              Remove-Item -LiteralPath "Cert:\CurrentUser\My\$($certificate.Thumbprint)" -Force -ErrorAction SilentlyContinue
            }
          }

      - name: Build installer with licensed Inno Setup
        shell: pwsh
        env:
          INNO_SETUP_LICENSE_CONFIRMED: ${{ vars.INNO_SETUP_LICENSE_CONFIRMED }}
        run: |
          if ($env:INNO_SETUP_LICENSE_CONFIRMED -ne "true") { throw "Inno Setup license is not confirmed" }
          choco install innosetup --version=6.7.3 -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          if ($LASTEXITCODE -ne 0) { throw "Installer build failed" }

      - name: Sign and verify release artifacts
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_PFX_BASE64: ${{ secrets.SIGNING_CERTIFICATE_PFX_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          SIGNING_TIMESTAMP_URL: ${{ vars.SIGNING_TIMESTAMP_URL }}
        run: |
          $version = "${{ steps.release_version.outputs.version }}"
          $installer = "dist\LAC-Setup-$version.exe"
          $pfxPath = Join-Path $env:RUNNER_TEMP "lac-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_PFX_BASE64))
          try {
            $password = ConvertTo-SecureString $env:SIGNING_CERTIFICATE_PASSWORD -AsPlainText -Force
            $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
            $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
              Where-Object FullName -Match '\\x64\\signtool\.exe$' |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName
            if (-not $signtool) { throw "signtool.exe was not found" }
            & $signtool sign /sha1 $certificate.Thumbprint /s My /fd SHA256 /tr $env:SIGNING_TIMESTAMP_URL /td SHA256 $installer
            if ($LASTEXITCODE -ne 0) { throw "Installer signing failed" }
            function Get-Rfc3161SignatureEvidence([string]$path) {
              $signature = Get-AuthenticodeSignature -FilePath $path
              if ($signature.Status -ne "Valid") {
                throw "Invalid Authenticode signature for ${path}: $($signature.Status)"
              }
              $timestampCertificate = $signature.TimeStamperCertificate
              if ($null -eq $timestampCertificate) {
                throw "RFC3161 timestamp certificate is missing for ${path}"
              }
              $ekuExtension = $timestampCertificate.Extensions |
                Where-Object { $_.Oid.Value -eq "2.5.29.37" }
              $hasTimestampEku = @($ekuExtension.EnhancedKeyUsages |
                Where-Object { $_.Value -eq "1.3.6.1.5.5.7.3.8" }).Count -gt 0
              if (-not $hasTimestampEku) {
                throw "Timestamp certificate lacks the timestamping EKU for ${path}"
              }
              $verified = @(& $signtool verify /pa /all /v $path 2>&1)
              if ($LASTEXITCODE -ne 0) { throw "signtool verification failed for ${path}" }
              $match = [regex]::Match(
                ($verified -join "`n"),
                "(?im)^\s*The signature is timestamped:\s*(.+?)\s*$"
              )
              if (-not $match.Success) { throw "RFC3161 timestamp is missing for ${path}" }
              $parsedTimestamp = [DateTimeOffset]::MinValue
              $style = [Globalization.DateTimeStyles]::AllowWhiteSpaces -bor
                [Globalization.DateTimeStyles]::AssumeLocal
              $parsed = [DateTimeOffset]::TryParseExact(
                $match.Groups[1].Value,
                "ddd MMM dd HH:mm:ss yyyy",
                [Globalization.CultureInfo]::InvariantCulture,
                $style,
                [ref]$parsedTimestamp
              )
              if (-not $parsed) {
                $parsed = [DateTimeOffset]::TryParse(
                  $match.Groups[1].Value,
                  [Globalization.CultureInfo]::CurrentCulture,
                  $style,
                  [ref]$parsedTimestamp
                )
              }
              if (-not $parsed) { throw "RFC3161 timestamp time is invalid for ${path}" }
              $timestampUtc = $parsedTimestamp.UtcDateTime
              if ($timestampUtc -lt $timestampCertificate.NotBefore.ToUniversalTime() -or
                  $timestampUtc -gt $timestampCertificate.NotAfter.ToUniversalTime()) {
                throw "RFC3161 timestamp falls outside its certificate window for ${path}"
              }
              return [pscustomobject]@{
                status = $signature.Status.ToString()
                timestamp = [ordered]@{
                  protocol = "RFC3161"
                  timestamped_at_utc = $timestampUtc.ToString("o")
                  certificate_subject = $timestampCertificate.Subject
                  certificate_thumbprint = $timestampCertificate.Thumbprint
                  certificate_not_before = $timestampCertificate.NotBefore.ToUniversalTime().ToString("o")
                  certificate_not_after = $timestampCertificate.NotAfter.ToUniversalTime().ToString("o")
                  timestamping_eku = $hasTimestampEku
                }
              }
            }
            $applicationSignature = Get-Rfc3161SignatureEvidence "dist\lac\lac.exe"
            $installerSignature = Get-Rfc3161SignatureEvidence $installer
          } finally {
            Remove-Item -LiteralPath $pfxPath -Force -ErrorAction SilentlyContinue
            if ($null -ne $certificate) {
              Remove-Item -LiteralPath "Cert:\CurrentUser\My\$($certificate.Thumbprint)" -Force -ErrorAction SilentlyContinue
            }
          }
          $installerItem = Get-Item $installer
          $applicationItem = Get-Item "dist\lac\lac.exe"
          $pythonSbomItem = Get-Item "dist\python-sbom.json"
          $webSbomItem = Get-Item "web\dist\web-sbom.json"
          $installerHash = (Get-FileHash -Algorithm SHA256 $installerItem.FullName).Hash.ToLowerInvariant()
          $applicationHash = (Get-FileHash -Algorithm SHA256 $applicationItem.FullName).Hash.ToLowerInvariant()
          $pythonSbomHash = (Get-FileHash -Algorithm SHA256 $pythonSbomItem.FullName).Hash.ToLowerInvariant()
          $webSbomHash = (Get-FileHash -Algorithm SHA256 $webSbomItem.FullName).Hash.ToLowerInvariant()
          $dependencyLockHash = (Get-FileHash -Algorithm SHA256 requirements-release.lock).Hash.ToLowerInvariant()
          "$installerHash  $($installerItem.Name)" | Set-Content dist\SHA256SUMS.txt -Encoding ascii
          Copy-Item -LiteralPath "web\dist\web-sbom.json" -Destination "dist\web-sbom.json"
          $provenance = [ordered]@{
            schema_version = 2
            version = $version
            tag = "${{ steps.release_version.outputs.tag }}"
            source_commit = "${{ github.sha }}"
            built_at_utc = [DateTime]::UtcNow.ToString("o")
            dependency_lock_sha256 = $dependencyLockHash
            python_version = (python --version 2>&1 | Out-String).Trim()
            pyinstaller_version = (pyinstaller --version 2>&1 | Out-String).Trim()
            installer = [ordered]@{
              filename = $installerItem.Name
              bytes = $installerItem.Length
              sha256 = $installerHash
              authenticode = $installerSignature.status
              rfc3161_timestamp = $installerSignature.timestamp
            }
            application = [ordered]@{
              filename = $applicationItem.Name
              bytes = $applicationItem.Length
              sha256 = $applicationHash
              authenticode = $applicationSignature.status
              rfc3161_timestamp = $applicationSignature.timestamp
            }
            python_sbom = [ordered]@{
              filename = $pythonSbomItem.Name
              bytes = $pythonSbomItem.Length
              sha256 = $pythonSbomHash
            }
            web_sbom = [ordered]@{
              filename = $webSbomItem.Name
              bytes = $webSbomItem.Length
              sha256 = $webSbomHash
            }
          }
          $provenance | ConvertTo-Json -Depth 4 | Set-Content dist\release-provenance.json -Encoding utf8

      - name: Attest the signed release provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/LAC-Setup-${{ steps.release_version.outputs.version }}.exe
            dist/lac/lac.exe
            dist/SHA256SUMS.txt
            dist/release-provenance.json
            dist/python-sbom.json
            dist/web-sbom.json

      - name: Upload signed release candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: signed-windows-${{ steps.release_version.outputs.version }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/LAC-Setup-${{ steps.release_version.outputs.version }}.exe
            dist/lac/lac.exe
            dist/SHA256SUMS.txt
            dist/release-provenance.json
            dist/python-sbom.json
            dist/web-sbom.json
