name: Protected Pro Gate Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Protected target"
        type: choice
        required: true
        options:
          - staging
          - production
      approved_commit:
        description: "Exact reviewed 40-character commit"
        type: string
        required: true
      approved_tag:
        description: "Signed annotated release tag (vX.Y.Z)"
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: pro-gate-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: pro-gate-${{ inputs.environment }}
    permissions:
      contents: read
    steps:
      - name: Check out the exact approved commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.approved_commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Verify the exact signed tag and every commit from the trust root
        shell: bash
        env:
          APPROVED_COMMIT: ${{ inputs.approved_commit }}
          APPROVED_TAG: ${{ inputs.approved_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          readonly TRUST_ROOT_COMMIT="f6ccf527b493e97ab5138afa4306241677037492" # pragma: allowlist secret
          readonly EXPECTED_WORKFLOW_REF="$GITHUB_REPOSITORY/.github/workflows/pro-gate-deploy.yml@refs/heads/master"
          test "$GITHUB_WORKFLOW_REF" = "$EXPECTED_WORKFLOW_REF"
          [[ "$APPROVED_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::approved_commit must be exact lowercase 40-hex"
            exit 1
          }
          [[ "$APPROVED_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::approved_tag must be an exact vX.Y.Z tag"
            exit 1
          }
          actual="$(git rev-parse HEAD)"
          test "$actual" = "$APPROVED_COMMIT"
          test "$(git rev-parse "refs/tags/$APPROVED_TAG^{commit}")" = "$actual"
          test "$(git cat-file -t "refs/tags/$APPROVED_TAG")" = "tag"
          test "$(git cat-file -t "$TRUST_ROOT_COMMIT")" = "commit"
          git merge-base --is-ancestor "$TRUST_ROOT_COMMIT" "$actual"
          git rev-list "$TRUST_ROOT_COMMIT..$actual" | sort \
            > "$RUNNER_TEMP/expected-commits.txt"
          test -s "$RUNNER_TEMP/expected-commits.txt"

          tag_object="$(git rev-parse "refs/tags/$APPROVED_TAG")"
          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$GITHUB_REPOSITORY/git/ref/tags/$APPROVED_TAG" \
            > "$RUNNER_TEMP/tag-ref.json"
          jq -e \
            --arg object "$tag_object" \
            '.object.type == "tag" and .object.sha == $object' \
            "$RUNNER_TEMP/tag-ref.json" > /dev/null

          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$GITHUB_REPOSITORY/git/tags/$tag_object" \
            > "$RUNNER_TEMP/tag-verification.json"
          jq -e \
            --arg commit "$actual" \
            --arg tag "$APPROVED_TAG" \
            '.tag == $tag
              and .verification.verified == true
              and .verification.reason == "valid"
              and .object.sha == $commit' \
            "$RUNNER_TEMP/tag-verification.json" > /dev/null

          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$GITHUB_REPOSITORY/commits/$TRUST_ROOT_COMMIT" \
            > "$RUNNER_TEMP/trust-root-verification.json"
          jq -e \
            --arg commit "$TRUST_ROOT_COMMIT" \
            '.sha == $commit
              and .commit.verification.verified == true
              and .commit.verification.reason == "valid"' \
            "$RUNNER_TEMP/trust-root-verification.json" > /dev/null

          gh api --paginate --slurp \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/$GITHUB_REPOSITORY/compare/$TRUST_ROOT_COMMIT...$actual?per_page=100" \
            > "$RUNNER_TEMP/compare-pages.json"
          jq -r '.[] | .commits[]?.sha' "$RUNNER_TEMP/compare-pages.json" \
            | sort -u > "$RUNNER_TEMP/api-commits.txt"
          cmp -s "$RUNNER_TEMP/expected-commits.txt" "$RUNNER_TEMP/api-commits.txt"
          jq -e \
            '.[0].status == "ahead"
              and ([.[] | .commits[]] | length > 0)
              and ([.[] | .commits[]] | all(
                .commit.verification.verified == true
                and .commit.verification.reason == "valid"
              ))' \
            "$RUNNER_TEMP/compare-pages.json" > /dev/null

      - name: Install locked verification dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --disable-pip-version-check "uv==0.11.28"
          uv pip install --system --require-hashes -r requirements-release.lock

      - name: Run source, workflow, and Worker gates
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest \
            tests/test_pro_commerce_readiness.py \
            tests/test_render_pro_gate_config.py \
            tests/test_pro_gate_deploy_workflow.py \
            tests/test_boundary_no_lac_pro_import.py \
            -q
          cd worker
          npm ci
          npm test
          npm run typecheck
          npm run types:check
          npm audit --audit-level=high
          npx wrangler deploy --dry-run --env staging
          npx wrangler deploy --dry-run --env production

      - name: Require protected deployment contracts
        id: protected
        shell: bash
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          APPROVED_COMMIT: ${{ inputs.approved_commit }}
          POLAR_TOKEN: ${{ secrets.POLAR_TOKEN }}
          POLAR_ORG_ID: ${{ secrets.POLAR_ORG_ID }}
          LOCAL_PRO_BENEFIT_ID: ${{ secrets.LOCAL_PRO_BENEFIT_ID }}
          PRO_CLOUD_BENEFIT_ID: ${{ secrets.PRO_CLOUD_BENEFIT_ID }}
          ENTITLEMENT_SIGNING_PRIVATE_KEY: ${{ secrets.ENTITLEMENT_SIGNING_PRIVATE_KEY }}
          ENTITLEMENT_SIGNING_KID: ${{ vars.ENTITLEMENT_SIGNING_KID }}
          ENTITLEMENT_SIGNING_PUBLIC_KEY: ${{ vars.ENTITLEMENT_SIGNING_PUBLIC_KEY }}
          ARTIFACT_KEY: ${{ secrets.ARTIFACT_KEY }}
          ARTIFACT_FILENAME: ${{ vars.ARTIFACT_FILENAME }}
          ARTIFACT_SHA256: ${{ secrets.ARTIFACT_SHA256 }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          LAC_PRO_TEST_LOCAL_KEY: ${{ secrets.LAC_PRO_TEST_LOCAL_KEY }}
          LAC_PRO_TEST_CLOUD_KEY: ${{ secrets.LAC_PRO_TEST_CLOUD_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PRO_GATE_URL: ${{ vars.PRO_GATE_URL }}
          PRO_GATE_WAF_EVIDENCE: ${{ vars.PRO_GATE_WAF_EVIDENCE }}
          PRO_GATE_STAGING_TESTED_COMMIT: ${{ vars.PRO_GATE_STAGING_TESTED_COMMIT }}
          SECRET_FILE: ${{ runner.temp }}/pro-gate-secrets-${{ github.run_id }}-${{ github.run_attempt }}.json
        run: |
          set -euo pipefail
          required=(
            POLAR_TOKEN POLAR_ORG_ID LOCAL_PRO_BENEFIT_ID PRO_CLOUD_BENEFIT_ID
            ENTITLEMENT_SIGNING_PRIVATE_KEY ENTITLEMENT_SIGNING_KID
            ENTITLEMENT_SIGNING_PUBLIC_KEY
            ARTIFACT_KEY ARTIFACT_FILENAME ARTIFACT_SHA256 R2_BUCKET_NAME
            LAC_PRO_TEST_LOCAL_KEY LAC_PRO_TEST_CLOUD_KEY
            CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID PRO_GATE_URL
            PRO_GATE_WAF_EVIDENCE
          )
          for name in "${required[@]}"; do
            test -n "${!name:-}" || {
              echo "::error::protected value $name is required"
              exit 1
            }
          done
          test "$LAC_PRO_TEST_LOCAL_KEY" != "$LAC_PRO_TEST_CLOUD_KEY"
          if [ "$DEPLOY_ENV" = "production" ]; then
            test "$PRO_GATE_STAGING_TESTED_COMMIT" = "$APPROVED_COMMIT" || {
              echo "::error::production requires the exact commit to have passed staging"
              exit 1
            }
          fi
          [[ "$PRO_GATE_WAF_EVIDENCE" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "::error::PRO_GATE_WAF_EVIDENCE must be a protected evidence digest"
            exit 1
          }

          CONFIG_PATH="$RUNNER_TEMP/pro-gate-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT.toml"
          SECRET_FILE="$RUNNER_TEMP/pro-gate-secrets-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT.json"
          trap 'rm -f "$CONFIG_PATH" "$SECRET_FILE"' ERR
          python scripts/render_pro_gate_config.py \
            --environment "$DEPLOY_ENV" \
            --source worker/wrangler.toml \
            --output "$CONFIG_PATH"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path(os.environ["SECRET_FILE"])
          path.write_text(json.dumps({
              "ENTITLEMENT_SIGNING_PRIVATE_KEY": os.environ["ENTITLEMENT_SIGNING_PRIVATE_KEY"],
          }), encoding="utf-8")
          path.chmod(0o600)
          PY

          case "$PRO_GATE_URL" in
            https://*/pro/download) ;;
            *) echo "::error::PRO_GATE_URL must be an exact HTTPS /pro/download endpoint"; exit 1 ;;
          esac
          export POLAR_API_BASE_URL="https://api.polar.sh/v1"
          if [ "$DEPLOY_ENV" = "staging" ]; then
            export POLAR_API_BASE_URL="https://sandbox-api.polar.sh/v1"
          fi
          python - <<'PY'
          import json
          import os
          import urllib.request

          headers = {
              "Accept": "application/json",
              "Authorization": f"Bearer {os.environ['POLAR_TOKEN']}",
              "User-Agent": "LAC-Pro-Gate-Deploy/1.0",
          }
          for name in ("LOCAL_PRO_BENEFIT_ID", "PRO_CLOUD_BENEFIT_ID"):
              expected = os.environ[name]
              request = urllib.request.Request(
                  f"{os.environ['POLAR_API_BASE_URL']}/benefits/{expected}",
                  headers=headers,
              )
              with urllib.request.urlopen(request, timeout=15) as response:
                  body = json.load(response)
              if (
                  body.get("id") != expected
                  or body.get("organization_id") != os.environ["POLAR_ORG_ID"]
                  or body.get("type") != "license_keys"
              ):
                  raise SystemExit(f"{name} failed its protected Polar contract")
          print("protected Polar benefit contracts verified")
          PY

          python scripts/pro_commerce_readiness.py \
            --worker-config "$CONFIG_PATH" \
            --worker-env "${{ inputs.environment }}" \
            --gate-url "$PRO_GATE_URL" \
            --require-rate-limiter \
            --require-receipt-signing \
            --allow-missing-lac-pro
          {
            echo "config_path=$CONFIG_PATH"
            echo "secret_file=$SECRET_FILE"
          } >> "$GITHUB_OUTPUT"
          trap - ERR
      - name: Strict deploy, smoke both tiers, and roll back on failure
        shell: bash
        working-directory: worker
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          APPROVED_COMMIT: ${{ inputs.approved_commit }}
          APPROVED_TAG: ${{ inputs.approved_tag }}
          CONFIG_PATH: ${{ steps.protected.outputs.config_path }}
          SECRET_FILE: ${{ steps.protected.outputs.secret_file }}
          PRO_GATE_URL: ${{ vars.PRO_GATE_URL }}
          LAC_PRO_TEST_LOCAL_KEY: ${{ secrets.LAC_PRO_TEST_LOCAL_KEY }}
          LAC_PRO_TEST_CLOUD_KEY: ${{ secrets.LAC_PRO_TEST_CLOUD_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          deployed=0
          cleanup() {
            rm -f "$CONFIG_PATH" "$SECRET_FILE"
          }
          rollback() {
            code=$?
            if [ "$code" -ne 0 ] && [ "$deployed" -eq 1 ]; then
              echo "::warning::deployment verification failed; rolling back immediately"
              npx wrangler rollback \
                --env "$DEPLOY_ENV" \
                --config "$CONFIG_PATH" \
                --message "automatic rollback after failed $APPROVED_TAG smoke" \
                --yes || echo "::error::automatic rollback failed; disable checkout and reservations"
            fi
            cleanup
            exit "$code"
          }
          trap rollback EXIT

          npx wrangler deploy --env "$DEPLOY_ENV" \
            --config "$CONFIG_PATH" \
            --secrets-file "$SECRET_FILE" \
            --strict \
            --tag "$APPROVED_COMMIT" \
            --message "$APPROVED_TAG approved commit $APPROVED_COMMIT"
          deployed=1

          npx wrangler secret list \
            --env "$DEPLOY_ENV" \
            --config "$CONFIG_PATH" \
            --format json > "$RUNNER_TEMP/pro-gate-secret-inventory-after.json"
          test "$(jq -c 'map(.name) | sort' "$RUNNER_TEMP/pro-gate-secret-inventory-after.json")" = \
            '["ENTITLEMENT_SIGNING_PRIVATE_KEY"]'

          local_ok=0
          for attempt in 1 2 3 4 5; do
            if python ../scripts/pro_commerce_readiness.py \
              --worker-config "$CONFIG_PATH" \
              --worker-env "${{ inputs.environment }}" \
              --gate-url "$PRO_GATE_URL" \
              --require-rate-limiter \
              --require-receipt-signing \
              --allow-missing-lac-pro \
              --live-gate \
              --expected-deployment-commit "$APPROVED_COMMIT" \
              --valid-key-env LAC_PRO_TEST_LOCAL_KEY; then
              local_ok=1
              break
            fi
            sleep $((attempt * 2))
          done
          test "$local_ok" -eq 1

          cloud_ok=0
          for attempt in 1 2 3 4 5; do
            if python ../scripts/pro_commerce_readiness.py \
              --worker-config "$CONFIG_PATH" \
              --worker-env "${{ inputs.environment }}" \
              --gate-url "$PRO_GATE_URL" \
              --require-rate-limiter \
              --require-receipt-signing \
              --allow-missing-lac-pro \
              --live-gate \
              --expected-deployment-commit "$APPROVED_COMMIT" \
              --valid-key-env LAC_PRO_TEST_CLOUD_KEY; then
              cloud_ok=1
              break
            fi
            sleep $((attempt * 2))
          done
          test "$cloud_ok" -eq 1

          trap - EXIT
          cleanup

      - name: Remove ephemeral protected files
        if: always()
        shell: bash
        env:
          CONFIG_PATH: ${{ steps.protected.outputs.config_path }}
          SECRET_FILE: ${{ steps.protected.outputs.secret_file }}
        run: |
          [ -z "${CONFIG_PATH:-}" ] || rm -f "$CONFIG_PATH"
          [ -z "${SECRET_FILE:-}" ] || rm -f "$SECRET_FILE"
